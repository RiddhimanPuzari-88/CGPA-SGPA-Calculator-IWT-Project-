<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KU SGPA & CGPA Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <header>
      <img src="logo.png" alt="KU Logo" class="logo">

      <h1>Kaziranga University</h1>
      <p>CSE 2023 Curriculum SGPA & CGPA Calculator</p>
    </header>

    <!-- SGPA SECTION -->

    <section class="card">

      <h2>SGPA Calculator</h2>

      <label>Select Semester</label>

      <select id="semesterSelect">
        <option value="">-- Select Semester --</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
        <option value="5">Semester 5</option>
        <option value="6">Semester 6</option>
        <option value="7">Semester 7</option>
        <option value="8">Semester 8</option>
      </select>

      <div id="subjectsContainer"></div>

      <button id="calculateSGPA">Calculate SGPA</button>

      <h3 id="sgpaResult"></h3>

    </section>

    <!-- CGPA SECTION -->

    <section class="card">

      <h2>CGPA Calculator</h2>

      <label>Select Current Semester</label>

      <select id="cgpaSemester">
        <option value="">-- Select Semester --</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
        <option value="5">Semester 5</option>
        <option value="6">Semester 6</option>
        <option value="7">Semester 7</option>
        <option value="8">Semester 8</option>
      </select>

      <div id="cgpaInputs"></div>

      <button id="calculateCGPA">Calculate CGPA</button>

      <h3 id="cgpaResult"></h3>

    </section>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>

</body>
</html>
